version: '3.8'

services:
  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: tw-stock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Main CLI application
  app:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.optimized
    container_name: tw-stock-app
    environment:
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
      - ./reports:/app/reports
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["python", "main.py", "--help"]

  # Data downloader service (定時下載股票資料)
  downloader:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.optimized
    container_name: tw-stock-downloader
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # 每日早上 9:00 下載資料
    command: >
      sh -c "
      while true; do
        echo 'Starting daily stock data download...'
        python main.py download
        echo 'Download completed. Waiting for next run...'
        sleep 86400
      done
      "

  # Stock scanner service (定時執行選股掃描)
  scanner:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.optimized
    container_name: tw-stock-scanner
    environment:
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # 每小時執行一次掃描並發送 Telegram 通知
    command: >
      sh -c "
      while true; do
        echo 'Starting stock scan...'
        python main.py scan --send-telegram
        echo 'Scan completed. Waiting for next run...'
        sleep 3600
      done
      "

  # Telegram bot service
  telegram-bot:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.optimized
    container_name: tw-stock-telegram
    environment:
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["python", "-m", "src.telegram.simple_notifier"]

  # Trade Recorder Bot — 接收 Telegram 買入/賣出指令並記錄至 Google Sheets
  trade-recorder:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.optimized
    container_name: tw-stock-trade-recorder
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GOOGLE_SHEETS_ENABLED=${GOOGLE_SHEETS_ENABLED:-false}
      - GOOGLE_SHEETS_SPREADSHEET_ID=${GOOGLE_SHEETS_SPREADSHEET_ID:-}
      - GOOGLE_SHEETS_WORKSHEET_NAME=${GOOGLE_SHEETS_WORKSHEET_NAME:-交易記錄}
      - GOOGLE_CREDENTIALS_JSON=${GOOGLE_CREDENTIALS_JSON:-}
      - GOOGLE_CREDENTIALS_FILE=${GOOGLE_CREDENTIALS_FILE:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    command: ["python", "-m", "src.interfaces.trade_bot_main"]

  # Taiwan Index Futures monitor service
  futures-monitor:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.optimized
    container_name: tw-stock-futures
    environment:
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # 每 30 分鐘執行一次期貨分析
    command: >
      sh -c "
      while true; do
        echo 'Starting futures analysis...'
        python main.py futures --send-telegram
        echo 'Futures analysis completed. Waiting for next run...'
        sleep 1800
      done
      "
    profiles:
      - full     # Enable with --profile full for complete monitoring
      - futures  # Enable with --profile futures for futures-only

  # Backtest runner (手動執行或定期執行)
  backtest:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.optimized
    container_name: tw-stock-backtest
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"  # 不自動重啟，僅手動執行
    command: ["python", "main.py", "backtest"]
    profiles:
      - backtest  # Enable with --profile backtest

volumes:
  redis_data:

networks:
  default:
    name: tw-stock-network