version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tw-stock-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tw_stock}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: tw-stock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Main application
  app:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: tw-stock-app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tw_stock}
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - FUBON_API_KEY=${FUBON_API_KEY}
      - FUBON_SECRET=${FUBON_SECRET}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Scanner service (separate for better resource management)
  scanner:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: tw-stock-scanner
    command: ["python", "-m", "src.scanner.main"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tw_stock}
      - REDIS_URL=redis://redis:6379
      - FUBON_API_KEY=${FUBON_API_KEY}
      - FUBON_SECRET=${FUBON_SECRET}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Telegram bot service
  telegram-bot:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: tw-stock-telegram
    command: ["python", "-m", "src.telegram.main"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tw_stock}
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Taiwan Index Futures monitor (TXF, MXF, MTX only)
  futures-monitor:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: tw-stock-futures
    command: ["python", "-m", "src.futures.main"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tw_stock}
      - REDIS_URL=redis://redis:6379
      - FUBON_API_KEY=${FUBON_API_KEY}
      - FUBON_API_SECRET=${FUBON_API_SECRET}
      - FUBON_USER_ID=${FUBON_USER_ID}
      - FUBON_PASSWORD=${FUBON_PASSWORD}
      - FUBON_CERT_PATH=${FUBON_CERT_PATH}
      - FUBON_CERT_PASSWORD=${FUBON_CERT_PASSWORD}
      - FUBON_IS_SIMULATION=${FUBON_IS_SIMULATION:-true}
      - FUTURES_ENABLED_CONTRACTS=${FUTURES_ENABLED_CONTRACTS:-TXF,MXF,MTX}
      - FUTURES_MONITOR_INTERVAL=${FUTURES_MONITOR_INTERVAL:-30}
      - FUTURES_MAX_POSITION_SIZE=${FUTURES_MAX_POSITION_SIZE:-10}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - futures  # Optional service, enable with --profile futures

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: tw-stock-network