main:
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - base_url: ${"https://asia-east1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/" + project_id + "/jobs/"}

    - run_download:
        call: http.post
        args:
          url: ${base_url + "bag-holder-download:run"}
          auth:
            type: OAuth2
        result: download_execution

    - wait_for_download:
        call: wait_for_execution
        args:
          self_link: ${download_execution.body.metadata.selfLink}
        result: download_status

    - check_download:
        switch:
          - condition: ${download_status != "succeeded"}
            raise: '${"bag-holder-download failed with status: " + download_status}'

    - run_signals:
        call: http.post
        args:
          url: ${base_url + "bag-holder-signals:run"}
          auth:
            type: OAuth2
        result: signals_execution

    - wait_for_signals:
        call: wait_for_execution
        args:
          self_link: ${signals_execution.body.metadata.selfLink}
        result: signals_status

    - check_signals:
        switch:
          - condition: ${signals_status != "succeeded"}
            raise: '${"bag-holder-signals failed with status: " + signals_status}'

    - done:
        return: "All jobs completed successfully"

# 輪詢 Cloud Run Job Execution 直到完成
wait_for_execution:
  params: [self_link]
  steps:
    - initial_sleep:
        call: sys.sleep
        args:
          seconds: 30

    - get_status:
        call: http.get
        args:
          url: ${"https://asia-east1-run.googleapis.com" + self_link}
          auth:
            type: OAuth2
        result: exec_resp

    - check_complete:
        switch:
          - condition: ${"completionTime" in exec_resp.body.status}
            next: determine_result

    - sleep_and_retry:
        call: sys.sleep
        args:
          seconds: 30
        next: get_status

    - determine_result:
        switch:
          - condition: ${"succeededCount" in exec_resp.body.status and exec_resp.body.status.succeededCount > 0}
            return: "succeeded"
          - condition: true
            return: "failed"
