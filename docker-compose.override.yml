# Mac Mini 2015 optimization overrides
version: '3.8'

services:
  postgres:
    # Optimize for limited RAM (4GB)
    environment:
      POSTGRES_SHARED_BUFFERS: "128MB"
      POSTGRES_EFFECTIVE_CACHE_SIZE: "512MB"
      POSTGRES_WORK_MEM: "4MB"
      POSTGRES_MAINTENANCE_WORK_MEM: "64MB"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  redis:
    # Limit Redis memory usage
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  app:
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  scanner:
    # Scanner can be more resource-intensive
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'

  telegram-bot:
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'