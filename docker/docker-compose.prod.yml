# Production Docker Compose configuration for Mac Mini 2015
version: '3.8'

services:
  # PostgreSQL Database - Optimized for Mac Mini 2015
  postgres:
    image: postgres:15-alpine
    container_name: tw-stock-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tw_stock}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Memory optimization for 4GB RAM system
      POSTGRES_SHARED_BUFFERS: 128MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 512MB
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
      POSTGRES_WAL_BUFFERS: 16MB
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.9
      POSTGRES_MAX_CONNECTIONS: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./data/backups:/backups
    ports:
      - "5432:5432"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis - Memory optimized
  redis:
    image: redis:7-alpine
    container_name: tw-stock-redis-prod
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # Main API application
  app:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    container_name: tw-stock-app-prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tw_stock}
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - FUBON_API_KEY=${FUBON_API_KEY}
      - FUBON_SECRET=${FUBON_SECRET}
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_LEVEL=INFO
      # Mac Mini 2015 optimizations
      - MAX_WORKERS=2
      - MEMORY_LIMIT_MB=1024
      - CPU_LIMIT=1.0
      - BATCH_PROCESSING_DELAY=2.0
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../config:/app/config:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # Market scanner service - Resource intensive
  scanner:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    container_name: tw-stock-scanner-prod
    command: ["python", "-m", "src.scanner.main"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tw_stock}
      - REDIS_URL=redis://redis:6379
      - FUBON_API_KEY=${FUBON_API_KEY}
      - FUBON_SECRET=${FUBON_SECRET}
      - APP_ENV=production
      - LOG_LEVEL=INFO
      # Scanner optimizations
      - SCAN_INTERVAL_SECONDS=600  # 10 minutes for production
      - SCAN_BATCH_SIZE=30
      - SCAN_MAX_CONCURRENT=5
      - MAX_WORKERS=1
      - MEMORY_LIMIT_MB=1536
      - BATCH_PROCESSING_DELAY=3.0
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # Telegram bot service
  telegram-bot:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    container_name: tw-stock-telegram-prod
    command: ["python", "-m", "src.telegram.main"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tw_stock}
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - MAX_WORKERS=1
      - MEMORY_LIMIT_MB=256
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Prometheus metrics (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: tw-stock-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=7d'  # Limited retention for Mac Mini
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    profiles:
      - monitoring

  # Grafana dashboard (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: tw-stock-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    profiles:
      - monitoring

  # Log aggregator (optional)
  loki:
    image: grafana/loki:latest
    container_name: tw-stock-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    profiles:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  default:
    name: tw-stock-network-prod
    driver: bridge