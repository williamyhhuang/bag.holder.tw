name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: asia-east1
  IMAGE: asia-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bag-holder-repo/bag-holder
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install TA-Lib C library
        run: |
          wget -q http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib
          ./configure --prefix=/usr
          make
          sudo make install

      - name: Install Python dependencies
        run: pip install -r requirements-prod.txt -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -m "not integration" -v --tb=short
        env:
          TELEGRAM_BOT_TOKEN: dummy_token
          TELEGRAM_CHAT_ID: "0"

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-east1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile.cloudrun \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Grant service account Secret Manager access
        run: |
          gcloud projects add-iam-policy-binding ${{ secrets.GCP_PROJECT_ID }} \
            --member="serviceAccount:bag-holder-runner@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --role="roles/secretmanager.secretAccessor" \
            --condition=None

      - name: Deploy bag-holder-download job
        run: |
          gcloud run jobs update bag-holder-download \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --update-env-vars="GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
          || \
          gcloud run jobs create bag-holder-download \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --service-account=bag-holder-runner@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --command=/entrypoint-download.sh \
            --memory=2Gi \
            --cpu=2 \
            --task-timeout=3600 \
            --max-retries=1 \
            --set-secrets="TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest" \
            --set-env-vars="APP_ENV=production,PYTHONUNBUFFERED=1,GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}"

      - name: Deploy bag-holder-signals job
        run: |
          gcloud run jobs update bag-holder-signals \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --update-env-vars="GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
          || \
          gcloud run jobs create bag-holder-signals \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --service-account=bag-holder-runner@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --command=/entrypoint-signals.sh \
            --memory=2Gi \
            --cpu=2 \
            --task-timeout=600 \
            --max-retries=1 \
            --set-secrets="TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest" \
            --set-env-vars="APP_ENV=production,PYTHONUNBUFFERED=1,GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}"
